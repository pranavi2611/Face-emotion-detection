<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emotion Detection App</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
      }
      .card {
        border-radius: 15px;
        margin-top: 2rem;
      }
      .spinner-border {
        display: none;
      }
    </style>
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <h1 class="text-center text-primary mb-4">
        😊 Emotion Detection Web App
      </h1>
      <p class="text-center text-muted">
        Upload an image, speak, or use your camera to detect an emotion.
      </p>

      <div class="row justify-content-center">
        <!-- Image Prediction Card -->
        <div class="col-lg-4 col-md-6">
          <div class="card p-4 shadow-lg">
            <h3 class="mb-3">🖼️ Detect from Image</h3>
            <form id="uploadForm" enctype="multipart/form-data">
              <input
                type="file"
                name="file"
                class="form-control my-2"
                accept="image/*"
              />
              <button type="submit" class="btn btn-primary w-100">
                Predict from Image
              </button>
            </form>
            <div
              id="imageResult"
              class="mt-3 alert"
              style="display: none"
            ></div>
          </div>
        </div>

        <!-- Voice Prediction Card -->
        <div class="col-lg-4 col-md-6">
          <div class="card p-4 shadow-lg">
            <h3 class="mb-3">🎤 Detect from Voice</h3>
            <button id="voiceBtn" class="btn btn-success w-100">
              <span
                id="voiceBtnSpinner"
                class="spinner-border spinner-border-sm"
                role="status"
                aria-hidden="true"
              ></span>
              Start Recording & Predict
            </button>
            <div
              id="voiceResult"
              class="mt-3 alert"
              style="display: none"
            ></div>
          </div>
        </div>

        <!-- Camera Prediction Card -->
        <div class="col-lg-4 col-md-6">
          <div class="card p-4 shadow-lg">
            <h3 class="mb-3">📷 Detect from Camera</h3>
            <button id="cameraBtn" class="btn btn-info w-100">
              <span
                id="cameraBtnSpinner"
                class="spinner-border spinner-border-sm"
                role="status"
                aria-hidden="true"
              ></span>
              Check Camera Emotion
            </button>
            <div
              id="cameraResult"
              class="mt-3 alert"
              style="display: none"
            ></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      document.getElementById("uploadForm").onsubmit = async (e) => {
        e.preventDefault();
        const resultDiv = document.getElementById("imageResult");
        const submitBtn = e.target.querySelector("button");
        submitBtn.disabled = true;
        resultDiv.style.display = "block";
        resultDiv.className = "mt-3 alert alert-info";
        resultDiv.innerHTML =
          "Analyzing image... <div class='spinner-border spinner-border-sm'></div>";

        let formData = new FormData(e.target);
        let res = await fetch("/predict_image", {
          method: "POST",
          body: formData,
        });
        let data = await res.json();

        if (data.error) {
          resultDiv.className = "mt-3 alert alert-danger";
          resultDiv.innerText = "Error: " + data.error;
        } else {
          resultDiv.className = "mt-3 alert alert-success";
          resultDiv.innerHTML = `Predicted Emotion: <strong>${data.emotion.toUpperCase()}</strong>`;
        }
        submitBtn.disabled = false;
      };

      document.getElementById("voiceBtn").onclick = async () => {
        const voiceBtn = document.getElementById("voiceBtn");
        const spinner = document.getElementById("voiceBtnSpinner");
        const resultDiv = document.getElementById("voiceResult");

        voiceBtn.disabled = true;
        spinner.style.display = "inline-block";
        resultDiv.style.display = "block";
        resultDiv.className = "mt-3 alert alert-info";
        resultDiv.innerHTML =
          "Listening... <div class='spinner-border spinner-border-sm'></div>";

        let res = await fetch("/predict_voice", { method: "POST" });
        let data = await res.json();

        if (data.error) {
          resultDiv.className = "mt-3 alert alert-danger";
          resultDiv.innerText = "Error: " + data.error;
        } else {
          resultDiv.className = "mt-3 alert alert-success";
          resultDiv.innerHTML = `You said: "<strong>${
            data.voice_text
          }</strong>"<br>Predicted Emotion: <strong>${data.emotion.toUpperCase()}</strong>`;
        }
        voiceBtn.disabled = false;
        spinner.style.display = "none";
      };

      document.getElementById("cameraBtn").onclick = async () => {
        const cameraBtn = document.getElementById("cameraBtn");
        const spinner = document.getElementById("cameraBtnSpinner");
        const resultDiv = document.getElementById("cameraResult");

        cameraBtn.disabled = true;
        spinner.style.display = "inline-block";
        resultDiv.style.display = "block";
        resultDiv.className = "mt-3 alert alert-info";
        resultDiv.innerHTML =
          "Accessing camera... <div class='spinner-border spinner-border-sm'></div>";

        let res = await fetch("/predict_camera", { method: "POST" });
        let data = await res.json();

        if (data.error) {
          resultDiv.className = "mt-3 alert alert-danger";
          resultDiv.innerText = "Error: " + data.error;
        } else {
          resultDiv.className = "mt-3 alert alert-success";
          resultDiv.innerHTML = `Camera Emotion: <strong>${data.emotion.toUpperCase()}</strong>`;
        }
        cameraBtn.disabled = false;
        spinner.style.display = "none";
      };
    </script>
  </body>
</html>
